version: '3.8'

services:
  # --- Databases ---
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  # --- Message Broker ---
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
    - RABBITMQ_CONSUMER_TIMEOUT=10000000
    
  # --- Optional: GUI for DBs --
  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:rootpassword@mongodb:27017/
    depends_on:
      - mongodb

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  notification-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r services/notification-service/requirements.txt && python services/notification-service/main.py"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - MONGODB_URI=mongodb://admin:rootpassword@mongodb:27017/
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
      - RABBITMQ_EXCHANGE=notifications.events
      - RABBITMQ_QUEUE=notification_events
      - RABBITMQ_DLQ=notification_events.dlq
      - RABBITMQ_MAX_RETRIES=5
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - REQUEST_TIMEOUT_SECONDS=15
    depends_on:
      - rabbitmq
      - mongodb

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "9922:8080"
    environment:
      - MODE=native
    volumes:
      - signal_cli_data:/home/.local/share/signal-cli

volumes:
  mongo_data:
  es_data:
  redis_data:
  signal_cli_data: